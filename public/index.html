<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aphilia Upload</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f12;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 24px;
      padding: 24px;
      box-sizing: border-box;
    }

    .socials {
      width: 180px;
      background: #17171c;
      border: 1px solid #2a2a34;
      border-radius: 16px;
      padding: 18px;
      box-sizing: border-box;
    }

    .socials h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .social-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #111;
      border: 1px solid #2f2f38;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      color: white;
      text-decoration: none;
    }

    .social-item:last-child {
      margin-bottom: 0;
    }

    .social-icon {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      fill: white;
    }

    .social-text {
      font-size: 15px;
      word-break: break-word;
    }

    .box {
      width: 420px;
      max-width: 90%;
      background: #17171c;
      border: 1px solid #2a2a34;
      border-radius: 16px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 16px;
    }

    .dropzone {
      border: 2px dashed #555;
      border-radius: 12px;
      padding: 35px 20px;
      text-align: center;
      cursor: pointer;
      background: #111;
    }

    .dropzone.dragover {
      border-color: #8b5cf6;
      background: #181124;
    }

    input {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0d0d10;
      color: white;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #8b5cf6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .copy-btn {
      margin-top: 10px;
      background: #444;
    }

    .result {
      margin-top: 14px;
      word-break: break-all;
    }

    code {
      background: #111;
      padding: 8px;
      display: block;
      border-radius: 8px;
      margin-top: 8px;
    }

    @media (max-width: 700px) {
      body {
        flex-direction: column;
      }

      .socials,
      .box {
        width: 100%;
        max-width: 420px;
      }
    }
  </style>
</head>

<body>
  <div class="socials">
    <h2>Links</h2>

    <a class="social-item" href="https://x.com/aphex94" target="_blank">
      <svg class="social-icon" viewBox="0 0 1200 1227" aria-hidden="true">
        <path d="M714.163 519.284 1160.89 0H1055.4L667.137 451.887 357.328 0H0l468.492 682.327L0 1226.37h105.495l409.37-476.152 326.807 476.152H1200L714.137 519.284h.026ZM568.037 689.98l-47.3-67.66L144.01 83.365h162.604l303.96 434.77 47.3 67.66 395.2 565.09H890.47L568.037 689.98Z"/>
      </svg>
      <span class="social-text">aphex94</span>
    </a>

    <div class="social-item">
      <svg class="social-icon" viewBox="0 0 245 240" aria-hidden="true">
        <path d="M104.4 104.8c-5.7 0-10.4 5-10.4 11.2 0 6.2 4.6 11.2 10.4 11.2 5.8 0 10.5-5 10.4-11.2 0-6.2-4.6-11.2-10.4-11.2z"/>
        <path d="M189.5 20h-134C24.2 20 0 44.2 0 74.5v91C0 195.8 24.2 220 55.5 220h113.3l-5.3-18.5 12.8 11.9 12.1 11.2 21.5 19V74.5C210 44.2 185.8 20 155.5 20zm-39.6 135s-3.7-4.4-6.8-8.3c13.5-3.8 18.6-12.2 18.6-12.2-4.2 2.8-8.2 4.8-11.8 6.2-5.1 2.2-10 3.7-14.8 4.6-9.8 1.8-18.8 1.3-26.6-.1-5.9-1.1-11-2.7-15.3-4.6-2.4-.9-5-2.1-7.6-3.5-.3-.2-.7-.3-1-.5-.2-.1-.3-.2-.5-.3-2.2-1.2-3.4-2-3.4-2s5 8.2 18.2 12.1c-3.1 3.9-6.9 8.5-6.9 8.5-22.8-.7-31.5-15.6-31.5-15.6 0-33.1 14.8-59.9 14.8-59.9 14.8-11.1 28.8-10.8 28.8-10.8l1 1.2c-18.5 5.3-27.1 13.4-27.1 13.4s2.3-1.3 6.2-3.2c11.2-5 20.1-6.4 23.8-6.7.6-.1 1.2-.2 1.8-.2 6.4-.8 13.6-1 21.1-.2 9.9 1.1 20.6 3.9 31.6 9.7 0 0-8.2-7.7-25.9-13l1.4-1.6s14-.3 28.8 10.8c0 0 14.8 26.8 14.8 59.9 0 0-8.8 14.9-31.6 15.6z"/>
      </svg>
      <span class="social-text">@aphex94</span>
    </div>
  </div>

  <div class="box">
    <h1>Aphilia Upload</h1>

    <div class="dropzone" id="dropzone">
      Drag & drop a video<br><br>or click to choose
    </div>

    <input type="file" id="fileInput" hidden />
    <input type="text" id="videoName" placeholder="Enter video name" />
    <input type="password" id="uploadKey" placeholder="Upload key" />

    <button id="uploadBtn">Upload</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const uploadKeyInput = document.getElementById("uploadKey");
    const videoNameInput = document.getElementById("videoName");
    const result = document.getElementById("result");

    let selectedFile = null;

    dropzone.onclick = () => fileInput.click();

    fileInput.onchange = () => {
      selectedFile = fileInput.files[0];
      dropzone.innerHTML = selectedFile.name;
    };

    dropzone.ondrop = (e) => {
      e.preventDefault();
      selectedFile = e.dataTransfer.files[0];
      dropzone.innerHTML = selectedFile.name;
    };

    dropzone.ondragover = (e) => {
      e.preventDefault();
      dropzone.classList.add("dragover");
    };

    dropzone.ondragleave = () => {
      dropzone.classList.remove("dragover");
    };

    function copyText() {
      const text = document.getElementById("output").innerText;
      navigator.clipboard.writeText(text);
      alert("Copied!");
    }

    uploadBtn.onclick = async () => {
      const key = uploadKeyInput.value.trim();
      const name = videoNameInput.value.trim();

      if (!selectedFile) return result.innerHTML = "Select a file.";
      if (!key) return result.innerHTML = "Enter upload key.";
      if (!name) return result.innerHTML = "Enter video name.";

      const formData = new FormData();
      formData.append("file", selectedFile);

      result.innerHTML = "Uploading...";

      const res = await fetch("/upload", {
        method: "POST",
        headers: { "x-upload-key": key },
        body: formData
      });

      const data = await res.json();

      if (!res.ok) return result.innerHTML = "Error uploading.";

      const formatted = `[${name}](${data.url})`;

      result.innerHTML = `
        Done.<br><br>
        <code id="output">${formatted}</code>
        <button class="copy-btn" onclick="copyText()">Copy</button>
      `;
    };
  </script>
</body>
</html>
