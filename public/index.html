<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aphilia Upload</title>

  <style>
    body {
      font-family: "Lucida Sans Unicode", "Lucida Grande", sans-serif;
      background: #0f0f12;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 24px;
      padding: 24px;
      box-sizing: border-box;
    }

    .socials {
      width: 190px;
      background: #17171c;
      border: 1px solid #2a2a34;
      border-radius: 16px;
      padding: 18px;
      box-sizing: border-box;
    }

    .socials h2 {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: normal;
    }

    .social-item,
    .social-copy {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #111;
      border: 1px solid #2f2f38;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      color: white;
      text-decoration: none;
      font-family: "Lucida Sans Unicode", "Lucida Grande", sans-serif;
      font-size: 15px;
      box-sizing: border-box;
    }

    .social-item:last-child,
    .social-copy:last-child {
      margin-bottom: 0;
    }

    .social-item:hover,
    .social-copy:hover {
      background: #18181f;
    }

    .social-copy {
      width: 100%;
      cursor: pointer;
      text-align: left;
    }

    .social-icon {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      fill: white;
    }

    .social-text {
      word-break: break-word;
    }

    .box {
      width: 420px;
      max-width: 90%;
      background: #17171c;
      border: 1px solid #2a2a34;
      border-radius: 16px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 16px;
      font-weight: normal;
    }

    .dropzone {
      border: 2px dashed #555;
      border-radius: 12px;
      padding: 35px 20px;
      text-align: center;
      cursor: pointer;
      background: #111;
      font-family: "Lucida Sans Unicode", "Lucida Grande", sans-serif;
    }

    .dropzone.dragover {
      border-color: #8b5cf6;
      background: #181124;
    }

    input {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0d0d10;
      color: white;
      box-sizing: border-box;
      font-family: "Lucida Sans Unicode", "Lucida Grande", sans-serif;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #8b5cf6;
      color: white;
      font-family: "Lucida Sans Unicode", "Lucida Grande", sans-serif;
      font-size: 14px;
      cursor: pointer;
    }

    .copy-btn {
      margin-top: 10px;
      background: #444;
    }

    .result {
      margin-top: 14px;
      word-break: break-all;
      font-size: 14px;
    }

    code {
      background: #111;
      padding: 8px;
      display: block;
      border-radius: 8px;
      margin-top: 8px;
      font-family: "Lucida Sans Unicode", "Lucida Grande", sans-serif;
    }

    @media (max-width: 700px) {
      body {
        flex-direction: column;
      }

      .socials,
      .box {
        width: 100%;
        max-width: 420px;
      }
    }
  </style>
</head>

<body>
  <div class="socials">
    <h2>Links</h2>

    <a class="social-item" href="https://x.com/aphex94" target="_blank">
      <svg class="social-icon" viewBox="0 0 1200 1227" aria-hidden="true">
        <path d="M714.163 519.284 1160.89 0H1055.4L667.137 451.887 357.328 0H0l468.492 682.327L0 1226.37h105.495l409.37-476.152 326.807 476.152H1200L714.137 519.284h.026ZM568.037 689.98l-47.3-67.66L144.01 83.365h162.604l303.96 434.77 47.3 67.66 395.2 565.09H890.47L568.037 689.98Z"/>
      </svg>
      <span class="social-text">@aphex94</span>
    </a>

    <button class="social-copy" onclick="copyDiscord()">
      <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20.317 4.369a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.211.375-.444.864-.608 1.249a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.249.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.056 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .077-.01c3.927 1.793 8.18 1.793 12.061 0a.074.074 0 0 1 .078.009c.12.099.246.198.373.292a.077.077 0 0 1-.006.128 12.299 12.299 0 0 1-1.873.891.076.076 0 0 0-.04.107c.36.698.772 1.363 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .03-.055c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.028ZM8.02 15.331c-1.183 0-2.157-1.085-2.157-2.418 0-1.333.955-2.418 2.157-2.418 1.211 0 2.175 1.094 2.157 2.418 0 1.333-.955 2.418-2.157 2.418Zm7.975 0c-1.183 0-2.157-1.085-2.157-2.418 0-1.333.955-2.418 2.157-2.418 1.211 0 2.175 1.094 2.157 2.418 0 1.333-.946 2.418-2.157 2.418Z"/>
      </svg>
      <span class="social-text" id="discordText">@aphex94</span>
    </button>
  </div>

  <div class="box">
    <h1>Aphilia Upload</h1>

    <div class="dropzone" id="dropzone">
      Drag & drop a video<br><br>or click to choose
    </div>

    <input type="file" id="fileInput" hidden />
    <input type="text" id="videoName" placeholder="Enter video name" />
    <input type="password" id="uploadKey" placeholder="Upload key" />

    <button id="uploadBtn">Upload</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const uploadKeyInput = document.getElementById("uploadKey");
    const videoNameInput = document.getElementById("videoName");
    const result = document.getElementById("result");

    let selectedFile = null;

    dropzone.onclick = () => fileInput.click();

    fileInput.onchange = () => {
      selectedFile = fileInput.files[0];
      dropzone.innerHTML = selectedFile.name;
    };

    dropzone.ondrop = (e) => {
      e.preventDefault();
      selectedFile = e.dataTransfer.files[0];
      dropzone.innerHTML = selectedFile.name;
      dropzone.classList.remove("dragover");
    };

    dropzone.ondragover = (e) => {
      e.preventDefault();
      dropzone.classList.add("dragover");
    };

    dropzone.ondragleave = () => {
      dropzone.classList.remove("dragover");
    };

    function copyDiscord() {
      navigator.clipboard.writeText("@aphex94");
      alert("Discord copied!");
    }

    function copyText() {
      const text = document.getElementById("output").innerText;
      navigator.clipboard.writeText(text);
      alert("Copied!");
    }

    uploadBtn.onclick = async () => {
      const key = uploadKeyInput.value.trim();
      const name = videoNameInput.value.trim();

      if (!selectedFile) return result.innerHTML = "Select a file.";
      if (!key) return result.innerHTML = "Enter upload key.";
      if (!name) return result.innerHTML = "Enter video name.";

      const formData = new FormData();
      formData.append("file", selectedFile);

      result.innerHTML = "Uploading...";

      const res = await fetch("/upload", {
        method: "POST",
        headers: { "x-upload-key": key },
        body: formData
      });

      const data = await res.json();

      if (!res.ok) return result.innerHTML = "Error uploading.";

      const formatted = `[${name}](${data.url})`;

      result.innerHTML = `
        Done.<br><br>
        <code id="output">${formatted}</code>
        <button class="copy-btn" onclick="copyText()">Copy</button>
      `;
    };
  </script>
</body>
</html>
